<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Blog y Noticias | VoltGrid Ingeniería</title>
    <meta name="description" content="Blog y noticias de VoltGrid Ingeniería. Mantente informado sobre las últimas tendencias en ingeniería eléctrica.">
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
    <link rel="icon" href="/favicon.png" sizes="512x512" type="image/png">
    <link rel="shortcut icon" href="/favicon-32.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Open Graph metadata -->
    <meta property="og:title" content="Blog y Noticias | VoltGrid Ingeniería">
    <meta property="og:description" content="Blog y noticias de VoltGrid Ingeniería. Mantente informado sobre las últimas tendencias en ingeniería eléctrica.">
    <meta property="og:type" content="website">
</head>
<body>

    <!-- Custom Cursor with Liquid Glass -->
    <div class="custom-cursor" id="custom-cursor">
        <glass-element
            id="cursor-glass"
            width="80"
            height="80"
            radius="40"
            depth="7"
            blur="1"
            strength="50"
            background-color="rgba(255,255,255,0.6)"
            chromatic-aberration="2"
            style="z-index: 9999; pointer-events: none;">
            <div class="cursor-inner">
                <div class="cursor-dot"></div>
            </div>
        </glass-element>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <h1 class="brand-name">VoltGrid</h1>
                <span class="brand-suffix">Ingeniería</span>
            </div>
            <div class="nav-actions">
                <button class="nav-cta" onclick="goBack()">Volver al Inicio</button>
            </div>
        </div>
    </nav>

    <!-- Blog y Noticias Section -->
    <section class="blog-news-section" id="blog-news">
        <!-- Fondo de energía renovable -->
        <div class="renewable-background">
            <div class="solar-panels-overlay"></div>
            <div class="wind-turbines-overlay"></div>
            <div class="green-fields-overlay"></div>
        </div>

        <div class="container">
            <div class="blog-news-header">
                <h2 class="blog-news-title">Blog y Noticias</h2>
                <p class="blog-news-subtitle">Mantente informado sobre las últimas tendencias en energía renovable e ingeniería eléctrica</p>
            </div>

            <!-- Contenedor de Noticias con Liquid Glass -->
            <div class="news-container" id="news-container">
                <!-- Las noticias se cargarán dinámicamente aquí -->
                <div class="loading-message">Cargando noticias...</div>
            </div>
        </div>
    </section>

    <!-- Glass Elements -->
    <div class="glass-element" id="ebooks-glass" auto-size="true" radius="20" depth="5" blur="1" strength="40" ca="2" bg="rgba(255,255,255,0.4)"></div>
    <div class="glass-element" id="cursor-glass" auto-size="true" radius="30" depth="5" blur="1" strength="40" ca="2" bg="rgba(255,255,255,0.6)"></div>

    <!-- Scripts -->
    <script src="displacement-utils.js"></script>
    <script src="glass-element.js"></script>
    
    <script>
        // Custom cursor with liquid glass effect
        const cursor = document.getElementById('custom-cursor');
        const cursorGlass = document.getElementById('cursor-glass');
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            const dx = mouseX - cursorX;
            const dy = mouseY - cursorY;
            
            cursorX += dx * 0.15; // Más rápido para cursor pequeño
            cursorY += dy * 0.15;
            
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // Hide default cursor on this page
        document.body.style.cursor = 'none';

        // Add hover effects for interactive elements
        const interactiveElements = document.querySelectorAll('.news-card, .blog-news-title, .ebooks-zone-title, .ebook-title');
        
        interactiveElements.forEach(element => {
            element.addEventListener('mouseenter', () => {
                // Cambiar propiedades del glass-element en hover - efecto elegante
                if (cursorGlass) {
                    cursorGlass.setAttribute('strength', '70');
                    cursorGlass.setAttribute('blur', '3');
                    cursorGlass.setAttribute('depth', '12');
                    cursorGlass.style.transform = 'scale(1.4) rotate(5deg)';
                    // Cambiar punto central a color elegante blanco-azulado
                    const cursorDot = cursorGlass.querySelector('.cursor-dot');
                    if (cursorDot) {
                        cursorDot.style.background = 'rgba(230, 240, 255, 0.95)';
                        cursorDot.style.boxShadow = '0 0 25px rgba(150, 200, 255, 0.6), 0 0 40px rgba(230, 240, 255, 0.4)';
                    }
                }
            });
            
            element.addEventListener('mouseleave', () => {
                // Restaurar propiedades del glass-element
                if (cursorGlass) {
                    cursorGlass.setAttribute('strength', '50');
                    cursorGlass.setAttribute('blur', '1');
                    cursorGlass.setAttribute('depth', '7');
                    cursorGlass.style.transform = 'scale(1) rotate(0deg)';
                    // Restaurar punto central a blanco
                    const cursorDot = cursorGlass.querySelector('.cursor-dot');
                    if (cursorDot) {
                        cursorDot.style.background = 'rgba(255, 255, 255, 0.9)';
                        cursorDot.style.boxShadow = '0 0 16px rgba(255, 255, 255, 0.8)';
                    }
                }
            });
        });

        // Go back function
        function goBack() {
            window.location.href = '/';
        }

        // Initialize glass elements
        if (window.glassElement) {
            window.glassElement.init();
        }

        // Cargar noticias de energía renovable
        loadRenewableEnergyNews();

        async function loadRenewableEnergyNews() {
            const newsContainer = document.getElementById('news-container');
            
            try {
                // Usar una API gratuita de noticias sobre energía renovable
                const response = await fetch('https://newsapi.org/v2/everything?q=renewable%20energy%20OR%20solar%20panels%20OR%20wind%20energy%20OR%20green%20energy&language=es&sortBy=publishedAt&pageSize=12&apiKey=YOUR_API_KEY');
                
                if (!response.ok) {
                    throw new Error('Error al cargar noticias');
                }
                
                const data = await response.json();
                displayNews(data.articles);
                
            } catch (error) {
                console.log('Error cargando noticias API, usando datos de ejemplo:', error);
                // Usar datos de ejemplo si la API falla
                displayExampleNews();
            }
        }

        function displayNews(articles) {
            const newsContainer = document.getElementById('news-container');
            newsContainer.innerHTML = '';
            
            articles.forEach((article, index) => {
                if (article.title && article.description && article.urlToImage) {
                    const newsCard = createNewsCard(article, index);
                    newsContainer.appendChild(newsCard);
                }
            });
        }

        function createNewsCard(article, index) {
            const card = document.createElement('div');
            card.className = 'news-card';
            card.onclick = () => window.open(article.url, '_blank');
            
            const publishDate = new Date(article.publishedAt).toLocaleDateString('es-ES', {
                day: 'numeric',
                month: 'short',
                year: 'numeric'
            });
            
            card.innerHTML = `
                <div class="news-card-glass"></div>
                <div class="news-card-content">
                    <img src="${article.urlToImage}" alt="${article.title}" class="news-card-image" onerror="this.src='https://picsum.photos/seed/renewable${index}/400/200.jpg'">
                    <h3 class="news-card-title">${article.title}</h3>
                    <p class="news-card-description">${article.description}</p>
                    <div class="news-card-meta">
                        <span class="news-card-source">${article.source.name}</span>
                        <span class="news-card-date">${publishDate}</span>
                    </div>
                </div>
            `;
            
            return card;
        }

        function displayExampleNews() {
            const exampleArticles = [
                {
                    title: "Avances revolucionarios en paneles solares de última generación",
                    description: "Nueva tecnología fotovoltaica promete aumentar la eficiencia en un 40% y reducir costos de producción significativamente.",
                    urlToImage: "https://picsum.photos/seed/solar1/400/200.jpg",
                    source: { name: "Energía Hoy" },
                    publishedAt: new Date().toISOString(),
                    url: "#"
                },
                {
                    title: "Colombia lidera transición energética en América Latina",
                    description: "El país duplica su capacidad de generación eólica y solar en el último año, posicionándose como referente regional.",
                    urlToImage: "https://picsum.photos/seed/wind1/400/200.jpg",
                    source: { name: "Revista Energía" },
                    publishedAt: new Date(Date.now() - 86400000).toISOString(),
                    url: "#"
                },
                {
                    title: "Innovador sistema de almacenamiento de energía revoluciona el sector",
                    description: "Nuevas baterías de iones de litio con mayor durabilidad y capacidad permiten almacenar energía renovable de forma más eficiente.",
                    urlToImage: "https://picsum.photos/seed/battery1/400/200.jpg",
                    source: { name: "Tecnología Verde" },
                    publishedAt: new Date(Date.now() - 172800000).toISOString(),
                    url: "#"
                },
                {
                    title: "Parques eólicos offshore: el futuro de la energía limpia",
                    description: "Proyectos masivos en el mar prometen generar energía suficiente para millones de hogares con cero emisiones.",
                    urlToImage: "https://picsum.photos/seed/offshore1/400/200.jpg",
                    source: { name: "Mundo Solar" },
                    publishedAt: new Date(Date.now() - 259200000).toISOString(),
                    url: "#"
                },
                {
                    title: "Hidrógeno verde: la clave para la descarbonización industrial",
                    description: "La producción de hidrógeno a partir de energías renovables se posiciona como solución para sectores difíciles de electrificar.",
                    urlToImage: "https://picsum.photos/seed/hydrogen1/400/200.jpg",
                    source: { name: "Energía Sostenible" },
                    publishedAt: new Date(Date.now() - 345600000).toISOString(),
                    url: "#"
                },
                {
                    title: "Smart Grids: redes inteligentes optimizan consumo energético",
                    description: "La implementación de redes eléctricas inteligentes permite distribución más eficiente y reduce pérdidas hasta en un 15%.",
                    urlToImage: "https://picsum.photos/seed/smartgrid1/400/200.jpg",
                    source: { name: "Ingeniería Eléctrica" },
                    publishedAt: new Date(Date.now() - 432000000).toISOString(),
                    url: "#"
                }
            ];
            
            displayNews(exampleArticles);
        }
    </script>

</body>
</html>
