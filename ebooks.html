    <!-- Scripts -->
    <script src="displacement-utils.js"></script>
    <script src="glass-element.js"></script>

    <script>
        // Detectar si es dispositivo táctil (móvil/tablet)
        const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        // ── Cursor (solo escritorio) ──────────────────────────────────────
        if (!isMobile) {
            const cursor = document.getElementById('custom-cursor');
            let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;
            document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
            (function tick() {
                cursorX += (mouseX - cursorX) * 0.15;
                cursorY += (mouseY - cursorY) * 0.15;
                cursor.style.left = cursorX + 'px';
                cursor.style.top  = cursorY + 'px';
                requestAnimationFrame(tick);
            })();
            document.body.style.cursor = 'none';
        }

        // ── Dock setup ────────────────────────────────────────────────────
        const wrap  = document.getElementById('dock-wrap');
        const track = document.getElementById('dock-track');

        let scrollPos  = 0;
        let autoScroll = true;
        const SPEED    = isMobile ? 0.4 : 0.25;

        // Duplicar items para bucle infinito
        track.innerHTML += track.innerHTML;
        const items = track.querySelectorAll('.dock-item');

        // ── Auto-scroll ────────────────────────────────────────────────────
        (function autoScrollFn() {
            if (autoScroll) {
                scrollPos += SPEED;
                const half = track.scrollWidth / 2;
                if (scrollPos >= half) scrollPos = 0;
                track.style.transform = `translateX(-${scrollPos}px)`;
            }
            requestAnimationFrame(autoScrollFn);
        })();

        // ── Magnification — funciones compartidas desktop + móvil ─────────
        const SCALE = 0.65;
        const SPRING = '300ms width cubic-bezier(0.34,1.56,0.64,1), 300ms height cubic-bezier(0.34,1.56,0.64,1), 300ms transform cubic-bezier(0.34,1.56,0.64,1)';

        function resetScale() {
            items.forEach(item => item.style.setProperty('--scale', 1));
        }

        function springReset() {
            items.forEach(item => { item.style.transition = SPRING; });
            resetScale();
            setTimeout(() => { items.forEach(item => { item.style.transition = 'none'; }); }, 320);
        }

        function applyMagnification(clientX) {
            let touched = null, offset = 0;
            for (const item of items) {
                const r = item.getBoundingClientRect();
                if (clientX >= r.left && clientX <= r.right) {
                    touched = item;
                    offset  = (clientX - r.left) / r.width;
                    break;
                }
            }
            if (!touched) return;
            resetScale();
            const prev = touched.previousElementSibling;
            const next = touched.nextElementSibling;
            if (prev) prev.style.setProperty('--scale', 1 + SCALE * Math.abs(offset - 1));
            touched.style.setProperty('--scale', 1 + SCALE);
            if (next) next.style.setProperty('--scale', 1 + SCALE * offset);
        }

        // ── Hover + magnification (solo escritorio) ────────────────────────
        if (!isMobile) {
            let rafPending = false;
            let pendingX   = 0;

            items.forEach(item => {
                item.addEventListener('mousemove', e => {
                    pendingX = e.clientX;
                    if (rafPending) return;
                    rafPending = true;
                    requestAnimationFrame(() => { rafPending = false; applyMagnification(pendingX); });
                });
            });

            wrap.addEventListener('mouseenter', () => {
                autoScroll = false;
                wrap.classList.add('is-hovered');
            });

            wrap.addEventListener('mouseleave', () => {
                autoScroll = true;
                wrap.classList.remove('is-hovered');
                springReset();
            });
        }

        // ── Click → OTL + ripple ───────────────────────────────────────────
        items.forEach(item => {
            item.addEventListener('click', () => {
                const url = window._otlMap && window._otlMap[item.dataset.title];
                if (url) window.open(url, '_blank', 'noopener,noreferrer');
                const card = item.querySelector('.dock-card');
                const r = document.createElement('div');
                r.style.cssText = `position:absolute;top:50%;left:50%;width:0;height:0;
                    border-radius:50%;background:rgba(255,255,255,0.45);
                    transform:translate(-50%,-50%);pointer-events:none;z-index:9;
                    transition:width .55s ease,height .55s ease,opacity .55s ease;`;
                card.appendChild(r);
                requestAnimationFrame(() => { r.style.width='240px'; r.style.height='240px'; r.style.opacity='0'; });
                setTimeout(() => r.remove(), 600);
            });
        });

        // ── Touch: swipe con inercia + burbuja glass (solo móvil) ─────────
        if (isMobile) {
            // Burbuja glass táctil
            const touchBubble = document.createElement('div');
            touchBubble.style.cssText = `
                position:fixed;width:54px;height:54px;border-radius:50%;
                -webkit-backdrop-filter:blur(14px) brightness(1.18) saturate(2);
                backdrop-filter:blur(14px) brightness(1.18) saturate(2);
                background:rgba(255,255,255,0.24);
                border:1px solid rgba(255,255,255,0.6);
                box-shadow:0 6px 24px rgba(0,0,0,0.12),inset 0 1px 0 rgba(255,255,255,0.75);
                pointer-events:none;z-index:99999;opacity:0;
                transform:translate(-50%,-50%) scale(0.5);
                transition:opacity .18s ease,transform .22s cubic-bezier(0.34,1.56,0.64,1);
                will-change:transform,opacity;`;
            document.body.appendChild(touchBubble);

            let txStart = 0, scrollStart = 0, isSwiping = false;
            let velocity = 0, lastTX = 0, lastTime = 0;
            let momentumRaf = null;

            wrap.addEventListener('touchstart', e => {
                if (momentumRaf) { cancelAnimationFrame(momentumRaf); momentumRaf = null; }
                const t = e.touches[0];
                txStart = t.clientX; scrollStart = scrollPos;
                autoScroll = false; isSwiping = true;
                velocity = 0; lastTX = t.clientX; lastTime = Date.now();

                touchBubble.style.left      = t.clientX + 'px';
                touchBubble.style.top       = t.clientY + 'px';
                touchBubble.style.opacity   = '1';
                touchBubble.style.transform = 'translate(-50%,-50%) scale(1)';
            }, { passive: true });

            wrap.addEventListener('touchmove', e => {
                e.preventDefault(); // evita que la página se desplace
                const t   = e.touches[0];
                const now = Date.now();
                const dt  = Math.max(now - lastTime, 1);
                // velocidad en px/frame a 60fps
                velocity  = (lastTX - t.clientX) / dt * 16;
                lastTX    = t.clientX; lastTime = now;

                const half = track.scrollWidth / 2;
                scrollPos  = scrollStart + (txStart - t.clientX);
                if (scrollPos < 0)     scrollPos += half;
                if (scrollPos >= half) scrollPos -= half;
                track.style.transform = `translateX(-${scrollPos}px)`;
                applyMagnification(t.clientX);

                touchBubble.style.left = t.clientX + 'px';
                touchBubble.style.top  = t.clientY + 'px';
            }, { passive: false });

            const endTouch = () => {
                if (!isSwiping) return;
                isSwiping = false;
                touchBubble.style.opacity   = '0';
                touchBubble.style.transform = 'translate(-50%,-50%) scale(0.5)';
                springReset();

                // Inercia: decelera hasta parar, luego reanuda auto-scroll
                const half = track.scrollWidth / 2;
                (function momentum() {
                    velocity *= 0.93;
                    if (Math.abs(velocity) < 0.5) { autoScroll = true; return; }
                    scrollPos += velocity;
                    if (scrollPos < 0)     scrollPos += half;
                    if (scrollPos >= half) scrollPos -= half;
                    track.style.transform = `translateX(-${scrollPos}px)`;
                    momentumRaf = requestAnimationFrame(momentum);
                })();
            };

            wrap.addEventListener('touchend',    endTouch, { passive: true });
            wrap.addEventListener('touchcancel', endTouch, { passive: true });
        }
    </script>

    <script>
    // ── Open Textbook Library matching ──────────────────────────────────
    (async function initOTL() {

        // Palabras clave por libro + URL de respaldo específica por tema
        const BOOKS = {
            'Guía RETIE':     { kw: ['wiring','installation','national electrical code','nec','electrical installation'],
                               fallback: 'https://open.umn.edu/opentextbooks/subjects/electrical' },
            'Solar 101':      { kw: ['solar energy','photovoltaic','solar panel','solar power','pv system'],
                               fallback: 'https://open.umn.edu/opentextbooks/subjects/electrical' },
            'Instalaciones':  { kw: ['electrical installation','building wiring','power circuit','electrical system'],
                               fallback: 'https://open.umn.edu/opentextbooks/subjects/electrical' },
            'Mantenimiento':  { kw: ['maintenance','preventive maintenance','reliability','electrical maintenance'],
                               fallback: 'https://open.umn.edu/opentextbooks/subjects/engineering' },
            'Normativa':      { kw: ['electrical code','standard','regulation','nec','ieee','iec'],
                               fallback: 'https://open.umn.edu/opentextbooks/subjects/electrical' },
            'Seguridad':      { kw: ['electrical safety','occupational safety','hazard','arc flash','grounding'],
                               fallback: 'https://open.umn.edu/opentextbooks/subjects/business'    },
            'Energía Solar':  { kw: ['solar energy','renewable energy','photovoltaic','solar radiation','solar thermal'],
                               fallback: 'https://open.umn.edu/opentextbooks/subjects/electrical' },
            'RETIE Avanzado': { kw: ['power systems','power distribution','electrical grid','transmission','substation'],
                               fallback: 'https://open.umn.edu/opentextbooks/subjects/electrical' }
        };

        function score(tb, kw) {
            const title   = (tb.title || '').toLowerCase();
            const rest    = [tb.description, ...(tb.subjects||[]).map(s=>s.name||s)].join(' ').toLowerCase();
            return kw.reduce((n, k) => {
                if (title.includes(k)) return n + 3; // título pesa más
                if (rest.includes(k))  return n + 1;
                return n;
            }, 0);
        }

        // Construir mapa title → URL
        const urlMap = {};
        try {
            const r = await fetch('https://open.umn.edu/opentextbooks/textbooks.json');
            if (!r.ok) throw new Error();
            const json = await r.json();
            const list = Array.isArray(json) ? json : (json.data || []);

            for (const [title, cfg] of Object.entries(BOOKS)) {
                let best = null, top = 0;
                for (const tb of list) {
                    const s = score(tb, cfg.kw);
                    if (s > top) { top = s; best = tb; }
                }
                urlMap[title] = (best && top > 0)
                    ? `https://open.umn.edu/opentextbooks/textbooks/${best.id}`
                    : cfg.fallback;
            }
        } catch (_) {
            for (const [title, cfg] of Object.entries(BOOKS)) {
                urlMap[title] = cfg.fallback;
            }
        }

        // Guardar mapa en global para que el click handler lo use
        window._otlMap = urlMap;

    })();
    </script>
